<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deploy Tool — wkng</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f172a; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; font-family: system-ui, sans-serif;
  }
  .card {
    background: #1e293b; border-radius: 20px; padding: 24px;
    width: 100%; max-width: 400px; border: 1px solid #334155;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .header { margin-bottom: 20px; }
  .header .emoji { font-size: 1.4rem; margin-bottom: 4px; }
  .header .title { color: #00ff88; font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; }
  .header .sub { color: #475569; font-size: 0.65rem; margin-top: 2px; }

  label {
    display: block; color: #64748b; font-size: 0.6rem;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  input[type="password"], input[type="text"] {
    width: 100%; padding: 10px 12px; background: #0f172a;
    border: 1px solid #334155; border-radius: 10px;
    color: #e2e8f0; font-size: 0.85rem; outline: none;
    font-family: inherit; transition: border-color 0.2s;
  }
  input[type="password"]:focus, input[type="text"]:focus {
    border-color: #00ff88;
  }
  .field { margin-bottom: 12px; }
  .remember {
    display: flex; align-items: center; gap: 6px;
    margin-top: 6px; cursor: pointer;
  }
  .remember input { accent-color: #00ff88; }
  .remember span { font-size: 0.6rem; color: #64748b; }

  .file-btn {
    width: 100%; padding: 12px 14px;
    background: #0f172a; border: 1px solid #334155;
    border-radius: 10px; color: #64748b;
    font-size: 0.8rem; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.2s; margin-bottom: 8px;
  }
  .file-btn.loaded {
    background: rgba(0,255,136,0.08);
    border-color: #00ff88; color: #00ff88;
  }
  .file-btn .size { font-size: 0.7rem; }

  .deploy-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #00ff88, #00c4ff);
    color: #000; font-weight: 800; font-size: 0.95rem;
    cursor: pointer; font-family: inherit; letter-spacing: 0.05em;
    transition: all 0.2s; margin-top: 4px;
  }
  .deploy-btn:disabled {
    background: #1e293b; border: 1px solid #334155;
    color: #475569; cursor: not-allowed;
  }
  .deploy-btn.done { background: #00ff88; }

  .log {
    margin-top: 14px; background: #0f172a; border-radius: 10px;
    padding: 12px; max-height: 160px; overflow-y: auto;
    display: none;
  }
  .log.visible { display: block; }
  .log-line {
    font-size: 0.68rem; margin-bottom: 4px;
    display: flex; gap: 8px;
  }
  .log-time { color: #334155; flex-shrink: 0; }

  .open-link {
    display: block; margin-top: 10px; text-align: center;
    color: #00ff88; font-size: 0.7rem; text-decoration: none; padding: 8px;
  }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="emoji">🚀</div>
    <div class="title">DEPLOY SU GITHUB</div>
    <div class="sub">xMikaelson/wkng → main</div>
  </div>

  <div class="field">
    <label>GitHub Token</label>
    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx">
    <label class="remember">
      <input type="checkbox" id="save-token">
      <span>Ricorda token su questo dispositivo</span>
    </label>
  </div>

  <div class="field">
    <label>Commit message</label>
    <input type="text" id="commit-msg" value="Update app">
  </div>

  <input type="file" id="input-index" accept=".html,text/html" style="display:none">
  <input type="file" id="input-sw" accept=".js,text/javascript" style="display:none">

  <button class="file-btn" id="btn-index" onclick="document.getElementById('input-index').click()">
    <span>📄 index.html</span>
    <span class="size" id="size-index">Scegli file →</span>
  </button>
  <button class="file-btn" id="btn-sw" onclick="document.getElementById('input-sw').click()">
    <span>⚙️ sw.js</span>
    <span class="size" id="size-sw">Scegli file →</span>
  </button>

  <button class="deploy-btn" id="deploy-btn" onclick="deploy()" disabled>
    Seleziona i file prima
  </button>

  <div class="log" id="log"></div>
  <a class="open-link" id="open-link" href="https://xMikaelson.github.io/wkng" target="_blank" style="display:none">
    🌐 Apri l'app pubblicata →
  </a>

</div>

<script>
const REPO = "xMikaelson/wkng";
const BRANCH = "main";
const files = { "index.html": null, "sw.js": null };

// Restore token
window.addEventListener('DOMContentLoaded', () => {
  const t = localStorage.getItem("gh_token_wkng");
  if (t) {
    document.getElementById("token").value = t;
    document.getElementById("save-token").checked = true;
  }
});

// File input handlers
document.getElementById("input-index").addEventListener("change", e => handleFile(e, "index.html", "btn-index", "size-index"));
document.getElementById("input-sw").addEventListener("change", e => handleFile(e, "sw.js", "btn-sw", "size-sw"));

function handleFile(e, name, btnId, sizeId) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    files[name] = { buffer: ev.target.result, size: file.size };
    document.getElementById(btnId).classList.add("loaded");
    document.getElementById(sizeId).textContent = "✅ " + (file.size / 1024).toFixed(0) + "KB";
    updateDeployBtn();
  };
  reader.readAsArrayBuffer(file);
}

function updateDeployBtn() {
  const btn = document.getElementById("deploy-btn");
  const loaded = Object.values(files).filter(Boolean);
  if (loaded.length === 0) {
    btn.disabled = true;
    btn.textContent = "Seleziona i file prima";
  } else {
    btn.disabled = false;
    btn.textContent = "🚀 DEPLOY (" + loaded.length + " file)";
  }
}

function log(msg, color) {
  const logEl = document.getElementById("log");
  logEl.classList.add("visible");
  const line = document.createElement("div");
  line.className = "log-line";
  const now = new Date().toLocaleTimeString("it-IT");
  line.innerHTML = `<span class="log-time">${now}</span><span style="color:${color || "#94a3b8"}">${msg}</span>`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

async function getFileSha(filename, token) {
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${filename}?ref=${BRANCH}`, {
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" }
  });
  if (r.ok) { const d = await r.json(); return d.sha; }
  return null;
}

function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

async function pushFile(filename, fileData, sha, token, commitMsg) {
  const b64 = arrayBufferToBase64(fileData.buffer);
  const body = { message: commitMsg, content: b64, branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${filename}`, {
    method: "PUT",
    headers: {
      Authorization: `token ${token}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const e = await r.json(); throw new Error(`${filename}: ${e.message}`); }
}

async function deployFile(filename, fileData, token, commitMsg) {
  log("🔍 Recupero SHA " + filename + "...");
  const shaRes = await fetch(
    "https://api.github.com/repos/" + REPO + "/contents/" + filename + "?ref=" + BRANCH + "&t=" + Date.now(),
    { cache: "no-store", headers: { Authorization: "token " + token, Accept: "application/vnd.github+json" } }
  );
  const sha = shaRes.ok ? (await shaRes.json()).sha : null;
  log("📤 Upload " + filename + "...", "#facc15");
  await pushFile(filename, fileData, sha, token, commitMsg);
  log("✅ " + filename + " aggiornato", "#00ff88");
}

function resetFiles() {
  files["index.html"] = null;
  files["sw.js"] = null;
  document.getElementById("btn-index").classList.remove("loaded");
  document.getElementById("size-index").textContent = "Scegli file →";
  document.getElementById("input-index").value = "";
  document.getElementById("btn-sw").classList.remove("loaded");
  document.getElementById("size-sw").textContent = "Scegli file →";
  document.getElementById("input-sw").value = "";
  updateDeployBtn();
}

async function deploy() {
  const token = document.getElementById("token").value.trim();
  const commitMsg = document.getElementById("commit-msg").value.trim() || "Update app";
  const btn = document.getElementById("deploy-btn");

  if (!token) { log("⚠️ Inserisci il token", "#f87171"); return; }

  const toUpload = Object.entries(files).filter(([, v]) => v !== null);
  if (toUpload.length === 0) { log("⚠️ Seleziona almeno un file", "#f87171"); return; }

  if (document.getElementById("save-token").checked) {
    localStorage.setItem("gh_token_wkng", token);
  } else {
    localStorage.removeItem("gh_token_wkng");
  }

  btn.disabled = true;
  btn.textContent = "⏳ Deploying...";
  document.getElementById("open-link").style.display = "none";
  document.getElementById("log").innerHTML = "";
  document.getElementById("log").classList.remove("visible");

  try {
    for (const [filename, fileData] of toUpload) {
      await deployFile(filename, fileData, token, commitMsg);
    }
    log("🚀 Deploy completato! GitHub Actions sta pubblicando...", "#00ff88");
    btn.classList.add("done");
    btn.textContent = "✅ DEPLOYATO!";
    btn.disabled = false;
    document.getElementById("open-link").style.display = "block";
    resetFiles();
  } catch (err) {
    log("❌ Errore: " + err.message, "#f87171");
    btn.disabled = false;
    btn.classList.remove("done");
    btn.textContent = "🚀 Riprova";
  }
}
</script>
</body>
</html>
