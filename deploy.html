<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deploy Tool — wkng</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f172a; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; font-family: system-ui, sans-serif;
  }
  .card {
    background: #1e293b; border-radius: 20px; padding: 24px;
    width: 100%; max-width: 400px; border: 1px solid #334155;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .header { margin-bottom: 20px; }
  .header .emoji { font-size: 1.4rem; margin-bottom: 4px; }
  .header .title { color: #00ff88; font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; }
  .header .sub { color: #475569; font-size: 0.65rem; margin-top: 2px; }
  label.field-label {
    display: block; color: #64748b; font-size: 0.6rem;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  input[type="password"], input[type="text"] {
    width: 100%; padding: 10px 12px; background: #0f172a;
    border: 1px solid #334155; border-radius: 10px;
    color: #e2e8f0; font-size: 0.85rem; outline: none;
    font-family: inherit; transition: border-color 0.2s;
  }
  input[type="password"]:focus, input[type="text"]:focus { border-color: #00ff88; }
  .field { margin-bottom: 12px; }
  .remember { display: flex; align-items: center; gap: 6px; margin-top: 6px; cursor: pointer; }
  .remember input { accent-color: #00ff88; }
  .remember span { font-size: 0.6rem; color: #64748b; }
  .file-btn {
    width: 100%; padding: 12px 14px;
    background: #0f172a; border: 1px solid #334155;
    border-radius: 10px; color: #64748b;
    font-size: 0.8rem; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.2s; margin-bottom: 8px;
  }
  .file-btn.loaded { background: rgba(0,255,136,0.08); border-color: #00ff88; color: #00ff88; }
  .file-btn .meta { text-align: right; }
  .file-btn .version { font-size: 0.72rem; font-weight: 700; }
  .file-btn .kb { font-size: 0.6rem; color: #475569; }
  .deploy-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #00ff88, #00c4ff);
    color: #000; font-weight: 800; font-size: 0.95rem;
    cursor: pointer; font-family: inherit; letter-spacing: 0.05em;
    transition: all 0.2s; margin-top: 4px;
  }
  .deploy-btn:disabled { background: #1e293b; border: 1px solid #334155; color: #475569; cursor: not-allowed; }
  .deploy-btn.done { background: #00ff88; }
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.visible { display: flex; }
  .confirm-card {
    background: #1e293b; border-radius: 20px; padding: 24px;
    width: 100%; max-width: 360px; border: 1px solid #334155;
  }
  .confirm-title { color: #00ff88; font-weight: 800; font-size: 0.8rem; letter-spacing: 0.08em; margin-bottom: 16px; }
  .confirm-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; padding: 7px 0; border-bottom: 1px solid #0f172a; }
  .confirm-row:last-of-type { border-bottom: none; }
  .confirm-row .label { color: #64748b; }
  .confirm-row .value { color: #e2e8f0; font-weight: 600; }
  .confirm-row .value.green { color: #00ff88; }
  .confirm-btns { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel { flex: 1; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; color: #64748b; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
  .btn-confirm { flex: 2; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, #00ff88, #00c4ff); color: #000; font-weight: 800; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
  .log { margin-top: 14px; background: #0f172a; border-radius: 10px; padding: 12px; max-height: 160px; overflow-y: auto; display: none; }
  .log.visible { display: block; }
  .log-line { font-size: 0.68rem; margin-bottom: 4px; display: flex; gap: 8px; }
  .log-time { color: #334155; flex-shrink: 0; }
  .open-link { display: block; margin-top: 10px; text-align: center; color: #00ff88; font-size: 0.7rem; text-decoration: none; padding: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="emoji">🚀</div>
    <div class="title">DEPLOY SU GITHUB</div>
    <div class="sub">xMikaelson/wkng → main</div>
  </div>

  <div class="field">
    <label class="field-label">GitHub Token</label>
    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx">
    <label class="remember">
      <input type="checkbox" id="save-token">
      <span>Ricorda token su questo dispositivo</span>
    </label>
  </div>

  <div class="field">
    <label class="field-label">Commit message</label>
    <input type="text" id="commit-msg" value="Update app">
  </div>

  <input type="file" id="input-index" accept=".html,text/html" style="display:none">
  <input type="file" id="input-sw" accept=".js,text/javascript" style="display:none">

  <button class="file-btn" id="btn-index" onclick="document.getElementById('input-index').click()">
    <span>📄 index.html</span>
    <div class="meta">
      <div class="version" id="ver-index">Scegli file →</div>
      <div class="kb" id="kb-index"></div>
    </div>
  </button>

  <button class="file-btn" id="btn-sw" onclick="document.getElementById('input-sw').click()">
    <span>⚙️ sw.js</span>
    <div class="meta">
      <div class="version" id="ver-sw">Scegli file →</div>
      <div class="kb" id="kb-sw"></div>
    </div>
  </button>

  <button class="deploy-btn" id="deploy-btn" onclick="askConfirm()" disabled>
    Seleziona i file prima
  </button>

  <div class="log" id="log"></div>
  <a class="open-link" id="open-link" href="https://xMikaelson.github.io/wkng" target="_blank" style="display:none">
    🌐 Apri l'app pubblicata →
  </a>
</div>

<div class="overlay" id="overlay">
  <div class="confirm-card">
    <div class="confirm-title">📋 CONFERMA DEPLOY</div>
    <div id="confirm-rows"></div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Annulla</button>
      <button class="btn-confirm" onclick="confirmDeploy()">🚀 Conferma</button>
    </div>
  </div>
</div>

<script>
var REPO = "xMikaelson/wkng";
var BRANCH = "main";
var loadedFiles = {};

window.addEventListener("DOMContentLoaded", function() {
  var t = localStorage.getItem("gh_token_wkng");
  if (t) {
    document.getElementById("token").value = t;
    document.getElementById("save-token").checked = true;
  }
  document.getElementById("input-index").addEventListener("change", function(e) { handleFile(e, "index.html", "btn-index", "ver-index", "kb-index"); });
  document.getElementById("input-sw").addEventListener("change", function(e) { handleFile(e, "sw.js", "btn-sw", "ver-sw", "kb-sw"); });
});

function extractVersion(filename) {
  var m = filename.match(/v[._]?\s*(\d+)/i);
  return m ? "v." + m[1] : filename;
}

function handleFile(e, name, btnId, verId, kbId) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    loadedFiles[name] = { buffer: ev.target.result, size: file.size, filename: file.name };
    document.getElementById(btnId).classList.add("loaded");
    document.getElementById(verId).textContent = extractVersion(file.name);
    document.getElementById(kbId).textContent = (file.size / 1024).toFixed(0) + "KB";
    updateDeployBtn();
  };
  reader.readAsArrayBuffer(file);
}

function updateDeployBtn() {
  var btn = document.getElementById("deploy-btn");
  var count = Object.keys(loadedFiles).length;
  if (count === 0) {
    btn.disabled = true;
    btn.textContent = "Seleziona i file prima";
  } else {
    btn.disabled = false;
    btn.textContent = "🚀 DEPLOY (" + count + " file)";
  }
}

function askConfirm() {
  var rows = "";
  for (var filename in loadedFiles) {
    var fd = loadedFiles[filename];
    rows += "<div class=\"confirm-row\"><span class=\"label\">" + filename + "</span><span class=\"value green\">" + extractVersion(fd.filename) + " &mdash; " + (fd.size/1024).toFixed(0) + "KB</span></div>";
  }
  var msg = document.getElementById("commit-msg").value || "Update app";
  rows += "<div class=\"confirm-row\"><span class=\"label\">Commit</span><span class=\"value\">" + msg + "</span></div>";
  rows += "<div class=\"confirm-row\"><span class=\"label\">Branch</span><span class=\"value\">" + BRANCH + "</span></div>";
  document.getElementById("confirm-rows").innerHTML = rows;
  document.getElementById("overlay").classList.add("visible");
}

function closeConfirm() {
  document.getElementById("overlay").classList.remove("visible");
}

function confirmDeploy() {
  closeConfirm();
  deploy();
}

function arrayBufferToBase64(buffer) {
  var bytes = new Uint8Array(buffer);
  var binary = "";
  for (var i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function addLog(msg, color) {
  var logEl = document.getElementById("log");
  logEl.classList.add("visible");
  var line = document.createElement("div");
  line.className = "log-line";
  var now = new Date().toLocaleTimeString("it-IT");
  line.innerHTML = "<span class=\"log-time\">" + now + "</span><span style=\"color:" + (color||"#94a3b8") + "\">" + msg + "</span>";
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

async function deployFile(filename, fileData, token, commitMsg) {
  addLog("🔍 SHA " + filename + "...");
  var shaRes = await fetch(
    "https://api.github.com/repos/" + REPO + "/contents/" + filename + "?ref=" + BRANCH + "&t=" + Date.now(),
    { cache: "no-store", headers: { Authorization: "token " + token, Accept: "application/vnd.github+json" } }
  );
  var sha = shaRes.ok ? (await shaRes.json()).sha : null;
  addLog("📤 Upload " + filename + "...", "#facc15");
  var b64 = arrayBufferToBase64(fileData.buffer);
  var body = { message: commitMsg, content: b64, branch: BRANCH };
  if (sha) body.sha = sha;
  var r = await fetch("https://api.github.com/repos/" + REPO + "/contents/" + filename, {
    method: "PUT",
    headers: {
      Authorization: "token " + token,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) { var e = await r.json(); throw new Error(filename + ": " + (e.message || r.status)); }
  addLog("✅ " + filename + " aggiornato", "#00ff88");
}

async function deploy() {
  var token = document.getElementById("token").value.trim();
  var commitMsg = document.getElementById("commit-msg").value.trim() || "Update app";
  var btn = document.getElementById("deploy-btn");

  if (!token) { addLog("⚠️ Inserisci il token", "#f87171"); return; }
  if (Object.keys(loadedFiles).length === 0) { addLog("⚠️ Nessun file caricato", "#f87171"); return; }

  if (document.getElementById("save-token").checked) localStorage.setItem("gh_token_wkng", token);
  else localStorage.removeItem("gh_token_wkng");

  btn.disabled = true;
  btn.textContent = "⏳ Deploying...";
  document.getElementById("open-link").style.display = "none";
  document.getElementById("log").innerHTML = "";
  document.getElementById("log").classList.remove("visible");

  try {
    for (var filename in loadedFiles) {
      await deployFile(filename, loadedFiles[filename], token, commitMsg);
    }
    addLog("🚀 Deploy completato! GitHub Actions sta pubblicando...", "#00ff88");
    btn.classList.add("done");
    btn.textContent = "✅ DEPLOYATO!";
    btn.disabled = false;
    document.getElementById("open-link").style.display = "block";
    // Reset file dopo deploy
    loadedFiles = {};
    document.getElementById("btn-index").classList.remove("loaded");
    document.getElementById("ver-index").textContent = "Scegli file →";
    document.getElementById("kb-index").textContent = "";
    document.getElementById("input-index").value = "";
    document.getElementById("btn-sw").classList.remove("loaded");
    document.getElementById("ver-sw").textContent = "Scegli file →";
    document.getElementById("kb-sw").textContent = "";
    document.getElementById("input-sw").value = "";
    updateDeployBtn();
  } catch(err) {
    addLog("❌ Errore: " + err.message, "#f87171");
    btn.disabled = false;
    btn.classList.remove("done");
    btn.textContent = "🚀 Riprova";
  }
}
</script>
</body>
</html>
